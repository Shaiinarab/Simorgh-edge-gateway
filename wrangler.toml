
name = "simorgh-edge-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "DATA_TRUST_VAULT"
class_name = "DataTrustVault"

[[durable_objects.bindings]]
name = "FLOCK_COORDINATOR"
class_name = "FlockCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DataTrustVault"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["FlockCoordinator"]

# اضافه کردن KV Namespace (کاملاً رایگان، بدون نیاز به کارت اعتباری)
[[kv_namespaces]]
binding = "CONTEXT_STORE"
id = "984ba26b093b4c5a8a1661ac36831c1b" 

[dev]
port = 8787
